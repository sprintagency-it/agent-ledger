name: Agent Ledger PR Review
description: Create a PR-native Agent Ledger review record from the current workspace state after an AI-agent run.

inputs:
  project:
    description: Project path to inspect. Run this after the agent has changed the workspace.
    required: false
    default: "."
  out:
    description: Agent Ledger output directory.
    required: false
    default: ".agent-ledger"
  name:
    description: Agent Ledger run name.
    required: false
    default: "github-pr-review"
  goal:
    description: Human-readable review goal.
    required: false
    default: "Review AI-generated code changes before merge"
  scope:
    description: Allowed review scope.
    required: false
    default: "."
  sensitive:
    description: Comma-separated sensitive paths or terms.
    required: false
    default: ".env,secrets,credentials,billing,finance,client,personal"
  fail-on-critical:
    description: Fail the workflow when the generated PR review record has Status BLOCK.
    required: false
    default: "true"
  fail-on-high:
    description: Fail the workflow when the generated PR review record has Status WARN.
    required: false
    default: "false"

outputs:
  session:
    description: Generated Agent Ledger session directory.
    value: ${{ steps.run-ledger.outputs.session }}
  pr-review:
    description: Generated PR review record path.
    value: ${{ steps.run-ledger.outputs.pr-review }}

runs:
  using: composite
  steps:
    - name: Create Agent Ledger PR review record
      id: run-ledger
      shell: bash
      run: |
        node "$GITHUB_ACTION_PATH/src/cli.mjs" init --out "${{ inputs.out }}"
        SESSION="$(node "$GITHUB_ACTION_PATH/src/cli.mjs" start \
          --project "${{ inputs.project }}" \
          --name "${{ inputs.name }}" \
          --goal "${{ inputs.goal }}" \
          --scope "${{ inputs.scope }}" \
          --sensitive "${{ inputs.sensitive }}" \
          --out "${{ inputs.out }}")"
        node "$GITHUB_ACTION_PATH/src/cli.mjs" ingest --type git --session "$SESSION"
        node "$GITHUB_ACTION_PATH/src/cli.mjs" render --session "$SESSION"
        echo "session=$SESSION" >> "$GITHUB_OUTPUT"
        echo "pr-review=$SESSION/pr-review.md" >> "$GITHUB_OUTPUT"

    - name: Publish PR review record to job summary
      shell: bash
      run: |
        if [ ! -f "${{ steps.run-ledger.outputs.pr-review }}" ]; then
          echo "Agent Ledger pr-review.md not found." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi

        cat "${{ steps.run-ledger.outputs.pr-review }}" >> "$GITHUB_STEP_SUMMARY"

    - name: Enforce Agent Ledger status
      shell: bash
      run: |
        if [ "${{ inputs.fail-on-critical }}" = "true" ] && grep -q "^Status: BLOCK$" "${{ steps.run-ledger.outputs.pr-review }}"; then
          echo "Agent Ledger blocked this PR review record because critical findings were detected."
          exit 1
        fi

        if [ "${{ inputs.fail-on-high }}" = "true" ] && grep -q "^Status: WARN$" "${{ steps.run-ledger.outputs.pr-review }}"; then
          echo "Agent Ledger warned on this PR review record because high-risk findings were detected."
          exit 1
        fi
