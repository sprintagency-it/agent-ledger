name: Agent Ledger PR Review
description: Run an AI-agent command under Agent Ledger capture and publish a PR-native review record.

inputs:
  command:
    description: Shell command that runs the AI-agent or simulated agent step to capture.
    required: true
  project:
    description: Project path to inspect.
    required: false
    default: "."
  out:
    description: Agent Ledger output directory. Defaults outside the repo so the ledger does not capture its own artifacts.
    required: false
    default: "../agent-ledger-output"
  name:
    description: Agent Ledger run name.
    required: false
    default: "github-pr-review"
  goal:
    description: Human-readable review goal.
    required: false
    default: "Review AI-generated code changes before merge"
  scope:
    description: Allowed review scope.
    required: false
    default: "."
  sensitive:
    description: Comma-separated sensitive paths or terms.
    required: false
    default: ".env,secrets,credentials,billing,finance,client,personal"
  fail-on-critical:
    description: Fail the workflow when the generated PR review record has Status BLOCK.
    required: false
    default: "true"
  fail-on-high:
    description: Fail the workflow when the generated PR review record has Status WARN.
    required: false
    default: "false"

outputs:
  session:
    description: Generated Agent Ledger session directory.
    value: ${{ steps.run-ledger.outputs.session }}
  pr-review:
    description: Generated PR review record path.
    value: ${{ steps.run-ledger.outputs.pr-review }}
  command-status:
    description: Exit code returned by the captured command.
    value: ${{ steps.run-ledger.outputs.command-status }}
  out:
    description: Absolute Agent Ledger output directory containing raw local evidence. Do not upload blindly.
    value: ${{ steps.run-ledger.outputs.out }}
  share:
    description: Redacted share bundle that excludes raw diffs, transcripts, workspace snapshots and command logs.
    value: ${{ steps.run-ledger.outputs.share }}

runs:
  using: composite
  steps:
    - name: Run command under Agent Ledger capture
      id: run-ledger
      shell: bash
      env:
        AGENT_LEDGER_COMMAND: ${{ inputs.command }}
      run: |
        mkdir -p "${{ inputs.out }}"
        OUT="$(cd "${{ inputs.out }}" && pwd)"

        node "$GITHUB_ACTION_PATH/src/cli.mjs" init --out "$OUT"
        SESSION="$(node "$GITHUB_ACTION_PATH/src/cli.mjs" start \
          --project "${{ inputs.project }}" \
          --name "${{ inputs.name }}" \
          --goal "${{ inputs.goal }}" \
          --scope "${{ inputs.scope }}" \
          --sensitive "${{ inputs.sensitive }}" \
          --out "$OUT")"

        set +e
        bash -lc "$AGENT_LEDGER_COMMAND"
        COMMAND_STATUS="$?"
        set -e

        node "$GITHUB_ACTION_PATH/src/cli.mjs" ingest --type git --session "$SESSION"
        node "$GITHUB_ACTION_PATH/src/cli.mjs" render --session "$SESSION"
        echo "session=$SESSION" >> "$GITHUB_OUTPUT"
        echo "pr-review=$SESSION/pr-review.md" >> "$GITHUB_OUTPUT"
        echo "command-status=$COMMAND_STATUS" >> "$GITHUB_OUTPUT"
        echo "out=$OUT" >> "$GITHUB_OUTPUT"
        echo "share=$SESSION/share" >> "$GITHUB_OUTPUT"

    - name: Publish PR review record to job summary
      shell: bash
      run: |
        if [ ! -f "${{ steps.run-ledger.outputs.pr-review }}" ]; then
          echo "Agent Ledger pr-review.md not found." >> "$GITHUB_STEP_SUMMARY"
          exit 1
        fi

        cat "${{ steps.run-ledger.outputs.pr-review }}" >> "$GITHUB_STEP_SUMMARY"

    - name: Enforce Agent Ledger status
      shell: bash
      run: |
        if [ "${{ inputs.fail-on-critical }}" = "true" ] && grep -q "^Status: BLOCK$" "${{ steps.run-ledger.outputs.pr-review }}"; then
          echo "Agent Ledger blocked this PR review record because critical findings were detected."
          exit 1
        fi

        if [ "${{ inputs.fail-on-high }}" = "true" ] && grep -q "^Status: WARN$" "${{ steps.run-ledger.outputs.pr-review }}"; then
          echo "Agent Ledger warned on this PR review record because high-risk findings were detected."
          exit 1
        fi

    - name: Enforce captured command status
      shell: bash
      run: |
        if [ "${{ steps.run-ledger.outputs.command-status }}" != "0" ]; then
          echo "The command captured by Agent Ledger failed with exit code ${{ steps.run-ledger.outputs.command-status }}."
          exit "${{ steps.run-ledger.outputs.command-status }}"
        fi
