name: Agent Ledger PR Review Smoke Test

on:
  workflow_dispatch:

jobs:
  agent-ledger:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The command must produce the changes after Agent Ledger starts.
      # Pre-existing changes are treated as baseline, not as this run's work.
      - name: Run Agent Ledger
        id: agent-ledger
        uses: ./
        with:
          command: "node -e \"const fs=require('fs'); fs.mkdirSync('tmp',{recursive:true}); fs.writeFileSync('tmp/agent-ledger-smoke.md','# Agent Ledger smoke\\n');\""
          goal: "Review this AI-generated PR before merge"
          scope: "tmp"
          fail-on-critical: "true"
          fail-on-high: "false"

      - name: Upload Agent Ledger artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-ledger
          path: ${{ steps.agent-ledger.outputs.share }}
